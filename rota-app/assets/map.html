<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0D1117; overflow: hidden; }
#map { width: 100vw; height: 100vh; }

/* Popup */
.mapboxgl-popup-content {
  background: #161B22 !important; color: #fff;
  border-radius: 14px; padding: 0;
  font-family: -apple-system, system-ui, sans-serif;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  border: 1px solid #30363D; max-width: 260px; overflow: hidden;
}
.mapboxgl-popup-tip { border-top-color: #161B22 !important; }
.mapboxgl-popup-close-button { color: #888; font-size: 18px; padding: 8px 10px; }
.pp { padding: 14px; }
.pp-cat { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; margin-bottom: 8px; }
.pp-title { font-weight: 700; font-size: 15px; color: #E6EDF3; margin-bottom: 4px; }
.pp-loc { font-size: 11px; color: #8B949E; margin-bottom: 8px; }
.pp-meta { display: flex; gap: 12px; font-size: 11px; color: #8B949E; margin-bottom: 12px; }
.pp-btn { width: 100%; padding: 11px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; background: #10B981; color: #fff; }
.pp-btn.j { background: #21262D; color: #8B949E; }

/* User dot */
.user-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #3B82F6; border: 3px solid #FFF;
  box-shadow: 0 0 0 6px rgba(59,130,246,0.2);
  animation: p 2s ease-out infinite;
  transform: translate(-50%, -50%);
}
@keyframes p { 0%{box-shadow:0 0 0 0 rgba(59,130,246,0.35)} 100%{box-shadow:0 0 0 18px rgba(59,130,246,0)} }

.mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>
<script>
mapboxgl.accessToken = window.__MAPBOX_TOKEN__ || '';

const CAT = {
  spor:  { c:'#FF6B35', i:'🏀', l:'Spor' },
  kosu:  { c:'#10B981', i:'🏃', l:'Kosu' },
  kafe:  { c:'#A78BFA', i:'☕', l:'Kafe' },
  kitap: { c:'#60A5FA', i:'📖', l:'Kitap' },
  oyun:  { c:'#F472B6', i:'🎮', l:'Oyun' },
  muzik: { c:'#FBBF24', i:'🎵', l:'Muzik' },
  saglik:{ c:'#34D399', i:'🌿', l:'Saglik' },
  diger: { c:'#8B949E', i:'✨', l:'Diger' }
};
const T2C = { group_run:'kosu',tempo_run:'kosu',long_run:'kosu',interval:'kosu',trail_run:'kosu',race:'kosu',social:'kafe' };
const MO = ['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];

let map, userMarker, popup;
let eventsData = []; // store for popup lookup

function initMap() {
  if (map || !mapboxgl.accessToken) return;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [27.15, 38.43],
    zoom: 13,
    attributionControl: false
  });

  map.on('load', () => {
    // ── GeoJSON source with clustering ──
    map.addSource('events', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
      cluster: true,
      clusterMaxZoom: 14,
      clusterRadius: 50
    });

    // Cluster circles
    map.addLayer({
      id: 'clusters',
      type: 'circle',
      source: 'events',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': ['step', ['get', 'point_count'], '#10B981', 5, '#FF6B35', 20, '#A78BFA'],
        'circle-radius': ['step', ['get', 'point_count'], 20, 5, 26, 20, 32],
        'circle-stroke-width': 2,
        'circle-stroke-color': 'rgba(255,255,255,0.15)'
      }
    });

    // Cluster count
    map.addLayer({
      id: 'cluster-count',
      type: 'symbol',
      source: 'events',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': '{point_count_abbreviated}',
        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
        'text-size': 13
      },
      paint: { 'text-color': '#ffffff' }
    });

    // ── Individual event points ──
    map.addLayer({
      id: 'event-bg',
      type: 'circle',
      source: 'events',
      filter: ['!', ['has', 'point_count']],
      paint: {
        'circle-color': '#0D1117',
        'circle-radius': 18,
        'circle-opacity': 0.6
      }
    });

    map.addLayer({
      id: 'event-emoji',
      type: 'symbol',
      source: 'events',
      filter: ['!', ['has', 'point_count']],
      layout: {
        'text-field': ['get', 'emoji'],
        'text-size': ['interpolate', ['linear'], ['zoom'], 10, 16, 15, 22],
        'text-allow-overlap': true,
        'text-ignore-placement': true
      }
    });

    // Event title label (visible at zoom >= 14)
    map.addLayer({
      id: 'event-label',
      type: 'symbol',
      source: 'events',
      filter: ['!', ['has', 'point_count']],
      minzoom: 14,
      layout: {
        'text-field': ['get', 'title'],
        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
        'text-size': 11,
        'text-offset': [0, 1.8],
        'text-anchor': 'top',
        'text-max-width': 12,
        'text-allow-overlap': false
      },
      paint: {
        'text-color': '#E6EDF3',
        'text-halo-color': '#0D1117',
        'text-halo-width': 1.5
      }
    });

    // ── Click handlers ──
    map.on('click', 'event-emoji', (e) => {
      if (!e.features || !e.features[0]) return;
      const p = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      showPopup(coords, p);
    });

    map.on('click', 'event-bg', (e) => {
      if (!e.features || !e.features[0]) return;
      const p = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      showPopup(coords, p);
    });

    map.on('click', 'clusters', (e) => {
      const f = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
      if (!f.length) return;
      map.getSource('events').getClusterExpansionZoom(f[0].properties.cluster_id, (err, z) => {
        if (err) return;
        map.easeTo({ center: f[0].geometry.coordinates, zoom: z + 1 });
      });
    });

    ['event-emoji', 'event-bg', 'clusters'].forEach(l => {
      map.on('mouseenter', l, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', l, () => { map.getCanvas().style.cursor = ''; });
    });

    postRN({ type: 'mapReady' });
  });
}

function resCat(e) {
  if (e.category && CAT[e.category]) return e.category;
  if (e.eventType && CAT[e.eventType]) return e.eventType;
  if (e.eventType && T2C[e.eventType]) return T2C[e.eventType];
  return 'diger';
}

// İzmir Bay water — conservative, only obvious open water
function isWater(lat, lng) {
  // Karşıyaka-Alsancak strait (open bay center)
  if (lat > 38.435 && lat < 38.455 && lng > 27.06 && lng < 27.125) return true;
  // South bay (below Konak, offshore)
  if (lat > 38.41 && lat < 38.435 && lng > 27.06 && lng < 27.11) return true;
  return false;
}

function setEvents(events) {
  if (!map || !map.getSource('events')) return;
  eventsData = events || [];

  const features = [];
  let visibleCount = 0;

  eventsData.forEach(e => {
    const lat = e.lat || e.meetingLat;
    const lng = e.lng || e.meetingLng;
    if (!lat || !lng) return;
    if (isWater(lat, lng)) return;

    const cat = resCat(e);
    const c = CAT[cat] || CAT.diger;

    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lng, lat] },
      properties: {
        id: e.id || '',
        slug: e.slug || e.id || '',
        title: e.title || '',
        emoji: c.i,
        category: cat,
        color: c.c,
        label: c.l,
        date: e.date || '',
        meetingPoint: e.meetingPoint || '',
        attendeeCount: e.attendeeCount || e.rsvpCount || 0,
        maxParticipants: e.maxParticipants || 0,
        isGoing: e.isGoing || false,
        creatorName: e.creatorName || ''
      }
    });
    visibleCount++;
  });

  map.getSource('events').setData({ type: 'FeatureCollection', features });
  postRN({ type: 'visibleCount', count: visibleCount });

  // Fit to events if no user marker yet
  if (features.length > 0 && !userMarker) {
    const bounds = new mapboxgl.LngLatBounds();
    features.forEach(f => bounds.extend(f.geometry.coordinates));
    map.fitBounds(bounds, { padding: 60, maxZoom: 15, duration: 800 });
  }
}

function showPopup(coords, p) {
  if (popup) popup.remove();
  const cat = p.category || 'diger';
  const c = CAT[cat] || CAT.diger;
  const isGoing = p.isGoing === true || p.isGoing === 'true';
  const d = new Date(p.date);
  const ok = !isNaN(d.getTime());
  const time = ok ? d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0') : '';
  const date = ok ? d.getDate()+' '+MO[d.getMonth()] : '';
  const cnt = p.attendeeCount || 0;
  const max = p.maxParticipants ? '/'+p.maxParticipants : '';
  const slug = esc(p.slug || p.id);

  popup = new mapboxgl.Popup({ closeOnClick: true, offset: 24, maxWidth: '260px' })
    .setLngLat(coords)
    .setHTML(`<div class="pp">
      <div class="pp-cat" style="background:${c.c}22;color:${c.c}">${c.i} ${c.l}</div>
      <div class="pp-title">${esc(p.title)}</div>
      ${p.meetingPoint ? `<div class="pp-loc">\u{1F4CD} ${esc(p.meetingPoint)}</div>` : ''}
      <div class="pp-meta">${date ? `<span>\u{1F4C5} ${date} \u00B7 ${time}</span>` : ''}<span>\u{1F465} ${cnt}${max}</span></div>
      <button class="pp-btn ${isGoing?'j':''}" onclick="postRN({type:'joinEvent',id:'${esc(p.id)}',slug:'${slug}'})">${isGoing?'KATILDIN \u2713':'KATIL'}</button>
    </div>`)
    .addTo(map);
}

function filterCategory(cat) {
  if (!map) return;
  const activeFilter = ['!', ['has', 'point_count']];
  const catFilter = cat ? ['all', activeFilter, ['==', ['get', 'category'], cat]] : activeFilter;

  map.setFilter('event-emoji', catFilter);
  map.setFilter('event-bg', catFilter);
  map.setFilter('event-label', cat ? ['all', activeFilter, ['==', ['get', 'category'], cat]] : activeFilter);

  // Recount visible
  const src = map.getSource('events');
  if (!src || !src._data) return;
  const feats = (src._data.features || []);
  const count = cat ? feats.filter(f => f.properties.category === cat).length : feats.length;
  postRN({ type: 'visibleCount', count });
}

function setUserLocation(loc) {
  if (!map) return;
  const coords = [loc.lng, loc.lat];
  if (!userMarker) {
    const el = document.createElement('div');
    el.className = 'user-dot';
    userMarker = new mapboxgl.Marker({ element: el }).setLngLat(coords).addTo(map);
    map.flyTo({ center: coords, zoom: 14, duration: 1000 });
  } else {
    userMarker.setLngLat(coords);
  }
}

function setVenues() {}
function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function postRN(d) { if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(d)); }

if (window.__MAPBOX_TOKEN__) initMap();
document.addEventListener('message', hMsg);
window.addEventListener('message', hMsg);
function hMsg(ev) {
  try {
    const m = JSON.parse(ev.data);
    switch(m.type) {
      case 'setToken': window.__MAPBOX_TOKEN__=m.data; mapboxgl.accessToken=m.data; initMap(); break;
      case 'setEvents': setEvents(m.data); break;
      case 'setVenues': setVenues(m.data); break;
      case 'setUserLocation': setUserLocation(m.data); break;
      case 'filterCategory': filterCategory(m.data); break;
      case 'flyTo': if(map) map.flyTo({center:[m.data.lng,m.data.lat],zoom:m.data.zoom||14}); break;
    }
  } catch(e){}
}
</script>
</body>
</html>
