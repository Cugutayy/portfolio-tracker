<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0D1117; overflow: hidden; }
#map { width: 100vw; height: 100vh; }

/* Popup */
.mapboxgl-popup-content {
  background: #161B22 !important;
  color: #fff;
  border-radius: 14px;
  padding: 0;
  font-family: -apple-system, system-ui, sans-serif;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  border: 1px solid #30363D;
  max-width: 240px;
  overflow: hidden;
}
.mapboxgl-popup-tip { border-top-color: #161B22 !important; }
.mapboxgl-popup-close-button { color: #888; font-size: 18px; padding: 8px; z-index: 1; }

.popup-card { padding: 14px; }
.popup-cat { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; margin-bottom: 8px; }
.popup-title { font-weight: 700; font-size: 15px; color: #E6EDF3; margin-bottom: 6px; line-height: 1.3; }
.popup-meta { display: flex; gap: 10px; font-size: 11px; color: #8B949E; margin-bottom: 10px; }
.popup-meta span { display: flex; align-items: center; gap: 3px; }
.popup-join {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer;
  background: #10B981; color: #fff;
}
.popup-join.joined { background: #21262D; color: #8B949E; }

/* Venue popup */
.venue-popup { padding: 10px 14px; }
.venue-name { font-weight: 700; font-size: 13px; color: #E6EDF3; margin-bottom: 4px; }
.venue-meta { font-size: 11px; color: #8B949E; }

/* User location pulse */
.user-marker {
  width: 20px; height: 20px; border-radius: 50%;
  background: #3B82F6; border: 3px solid #FFF;
  box-shadow: 0 0 0 6px rgba(59,130,246,0.25);
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
  100% { box-shadow: 0 0 0 20px rgba(59,130,246,0); }
}

/* Hide Mapbox branding */
.mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>

<script>
mapboxgl.accessToken = window.__MAPBOX_TOKEN__ || '';

const CATEGORY_COLORS = {
  spor: '#FF6B35', kosu: '#10B981', kafe: '#A78BFA', kitap: '#60A5FA',
  oyun: '#F472B6', muzik: '#FBBF24', saglik: '#34D399', diger: '#8B949E'
};
const CATEGORY_ICONS = {
  spor: '\u{1F3C0}', kosu: '\u{1F3C3}\u200D\u2642\uFE0F', kafe: '\u2615',
  kitap: '\u{1F4D6}', oyun: '\u{1F3AE}', muzik: '\u{1F3B6}',
  saglik: '\u{1F33F}', diger: '\u2728'
};
const CATEGORY_LABELS = {
  spor: 'Spor', kosu: 'Kosu', kafe: 'Kafe', kitap: 'Kitap',
  oyun: 'Oyun', muzik: 'Muzik', saglik: 'Saglik', diger: 'Diger'
};
// Map old event types to categories
const TYPE_TO_CAT = {
  group_run:'kosu', tempo_run:'kosu', long_run:'kosu',
  interval:'kosu', trail_run:'kosu', race:'kosu', social:'kafe'
};

let map, userMarker, currentPopup;

function initMap() {
  if (map || !mapboxgl.accessToken) return;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [27.1428, 38.4237],
    zoom: 13,
    attributionControl: false
  });

  map.on('load', () => {
    // Event source with clustering
    map.addSource('events', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
      cluster: true,
      clusterMaxZoom: 14,
      clusterRadius: 50
    });

    // Cluster circles
    map.addLayer({
      id: 'event-clusters',
      type: 'circle',
      source: 'events',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': ['step', ['get', 'point_count'], '#10B981', 5, '#FF6B35', 15, '#A78BFA'],
        'circle-radius': ['step', ['get', 'point_count'], 22, 5, 28, 15, 34],
        'circle-opacity': 0.85,
        'circle-stroke-width': 2,
        'circle-stroke-color': '#0D1117'
      }
    });

    // Cluster count labels
    map.addLayer({
      id: 'event-cluster-count',
      type: 'symbol',
      source: 'events',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': '{point_count_abbreviated}',
        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
        'text-size': 13
      },
      paint: { 'text-color': '#ffffff' }
    });

    // Individual event markers
    map.addLayer({
      id: 'event-points',
      type: 'circle',
      source: 'events',
      filter: ['!', ['has', 'point_count']],
      paint: {
        'circle-color': ['match', ['get', 'category'],
          'spor', '#FF6B35', 'kosu', '#10B981', 'kafe', '#A78BFA',
          'kitap', '#60A5FA', 'oyun', '#F472B6', 'muzik', '#FBBF24',
          'saglik', '#34D399', '#8B949E'],
        'circle-radius': 10,
        'circle-stroke-width': 2.5,
        'circle-stroke-color': '#0D1117'
      }
    });

    // Event icon labels
    map.addLayer({
      id: 'event-labels',
      type: 'symbol',
      source: 'events',
      filter: ['!', ['has', 'point_count']],
      layout: {
        'text-field': ['get', 'icon'],
        'text-size': 16,
        'text-allow-overlap': true,
        'text-ignore-placement': true
      }
    });

    // Venue source
    map.addSource('venues', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] }
    });

    map.addLayer({
      id: 'venue-points',
      type: 'circle',
      source: 'venues',
      paint: {
        'circle-color': '#6E7681',
        'circle-radius': 5,
        'circle-opacity': 0.5,
        'circle-stroke-width': 1,
        'circle-stroke-color': '#30363D'
      }
    });

    // Click: event point
    map.on('click', 'event-points', (e) => {
      if (!e.features || !e.features[0]) return;
      const p = e.features[0].properties;
      showEventPopup(e.lngLat, p);
    });

    // Click: cluster — zoom in
    map.on('click', 'event-clusters', (e) => {
      const features = map.queryRenderedFeatures(e.point, { layers: ['event-clusters'] });
      if (!features.length) return;
      const clusterId = features[0].properties.cluster_id;
      map.getSource('events').getClusterExpansionZoom(clusterId, (err, zoom) => {
        if (err) return;
        map.easeTo({ center: features[0].geometry.coordinates, zoom: zoom + 1 });
      });
    });

    // Click: venue
    map.on('click', 'venue-points', (e) => {
      if (!e.features || !e.features[0]) return;
      const p = e.features[0].properties;
      if (currentPopup) currentPopup.remove();
      currentPopup = new mapboxgl.Popup({ closeOnClick: true, offset: 8 })
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="venue-popup">
            <div class="venue-name">${esc(p.name)}</div>
            <div class="venue-meta">${p.recentEventCount || 0} etkinlik bu hafta</div>
          </div>
        `)
        .addTo(map);
    });

    // Cursor changes
    ['event-points', 'event-clusters', 'venue-points'].forEach(layer => {
      map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
    });

    postRN({ type: 'mapReady' });
  });
}

function resolveCat(p) {
  if (p.category && CATEGORY_COLORS[p.category]) return p.category;
  if (p.eventType && TYPE_TO_CAT[p.eventType]) return TYPE_TO_CAT[p.eventType];
  return 'diger';
}

function showEventPopup(lngLat, p) {
  if (currentPopup) currentPopup.remove();
  const cat = resolveCat(p);
  const color = CATEGORY_COLORS[cat] || '#8B949E';
  const icon = CATEGORY_ICONS[cat] || '\u2728';
  const label = CATEGORY_LABELS[cat] || 'Diger';
  const isGoing = p.isGoing === true || p.isGoing === 'true';
  const d = new Date(p.date);
  const timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');

  currentPopup = new mapboxgl.Popup({ closeOnClick: true, offset: 12, maxWidth: '240px' })
    .setLngLat(lngLat)
    .setHTML(`
      <div class="popup-card">
        <div class="popup-cat" style="background:${color}20;color:${color}">${icon} ${label}</div>
        <div class="popup-title">${esc(p.title)}</div>
        <div class="popup-meta">
          <span>\u{1F552} ${timeStr}</span>
          <span>\u{1F465} ${p.attendeeCount || 0}${p.maxParticipants ? '/' + p.maxParticipants : ''}</span>
        </div>
        <button class="popup-join ${isGoing ? 'joined' : ''}" onclick="onJoinClick('${p.id}','${p.slug}')">${isGoing ? 'KATILDIN' : 'KATIL'}</button>
      </div>
    `)
    .addTo(map);
}

function onJoinClick(id, slug) {
  postRN({ type: 'joinEvent', id, slug });
}

function esc(s) { return String(s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function postRN(data) {
  if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(data));
}

// ── Data handlers ──

function setEvents(events) {
  if (!map || !map.getSource('events')) return;
  const features = (events || []).filter(e => e.lat && e.lng).map(e => {
    const cat = e.category && CATEGORY_COLORS[e.category] ? e.category : (TYPE_TO_CAT[e.eventType] || 'diger');
    return {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [e.lng, e.lat] },
      properties: {
        id: e.id, slug: e.slug, title: e.title, category: cat,
        eventType: e.eventType || '',
        icon: CATEGORY_ICONS[cat] || '\u2728',
        date: e.date, attendeeCount: e.attendeeCount || e.rsvpCount || 0,
        maxParticipants: e.maxParticipants, isGoing: e.isGoing,
        meetingPoint: e.meetingPoint, creatorName: e.creatorName
      }
    };
  });
  map.getSource('events').setData({ type: 'FeatureCollection', features });

  // Fit bounds if events exist
  if (features.length > 0) {
    const bounds = new mapboxgl.LngLatBounds();
    features.forEach(f => bounds.extend(f.geometry.coordinates));
    // Only fit if no user location (user location centering takes priority)
    if (!userMarker) {
      map.fitBounds(bounds, { padding: 60, maxZoom: 15, duration: 800 });
    }
  }
}

function setVenues(venues) {
  if (!map || !map.getSource('venues')) return;
  const features = (venues || []).map(v => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [v.lng, v.lat] },
    properties: { id: v.id, name: v.name, type: v.type, recentEventCount: v.recentEventCount || 0 }
  }));
  map.getSource('venues').setData({ type: 'FeatureCollection', features });
}

function setUserLocation(loc) {
  if (!map) return;
  const coords = [loc.lng, loc.lat];
  if (!userMarker) {
    const el = document.createElement('div');
    el.className = 'user-marker';
    userMarker = new mapboxgl.Marker({ element: el }).setLngLat(coords).addTo(map);
    map.flyTo({ center: coords, zoom: 14, duration: 1000 });
  } else {
    userMarker.setLngLat(coords);
  }
}

function filterCategory(category) {
  if (!map) return;
  if (!category) {
    map.setFilter('event-points', ['!', ['has', 'point_count']]);
    map.setFilter('event-labels', ['!', ['has', 'point_count']]);
  } else {
    map.setFilter('event-points', ['all', ['!', ['has', 'point_count']], ['==', ['get', 'category'], category]]);
    map.setFilter('event-labels', ['all', ['!', ['has', 'point_count']], ['==', ['get', 'category'], category]]);
  }
}

// ── Message bridge ──

if (window.__MAPBOX_TOKEN__) initMap();

document.addEventListener('message', handleMessage);
window.addEventListener('message', handleMessage);

function handleMessage(event) {
  try {
    const msg = JSON.parse(event.data);
    switch (msg.type) {
      case 'setToken':
        window.__MAPBOX_TOKEN__ = msg.data;
        mapboxgl.accessToken = msg.data;
        initMap();
        break;
      case 'setEvents': setEvents(msg.data); break;
      case 'setVenues': setVenues(msg.data); break;
      case 'setUserLocation': setUserLocation(msg.data); break;
      case 'filterCategory': filterCategory(msg.data); break;
      case 'flyTo':
        if (map) map.flyTo({ center: [msg.data.lng, msg.data.lat], zoom: msg.data.zoom || 14 });
        break;
    }
  } catch (e) {}
}
</script>
</body>
</html>
