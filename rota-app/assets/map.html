<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0D1117; overflow: hidden; }
#map { width: 100vw; height: 100vh; }

/* Event marker */
.ev-marker {
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; transform: translate(-50%, -100%);
}
.ev-pin {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: 20px;
  font-family: -apple-system, system-ui, sans-serif;
  box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.15);
  white-space: nowrap; max-width: 180px;
}
.ev-pin .ev-icon { font-size: 16px; flex-shrink: 0; }
.ev-pin .ev-title {
  font-size: 11px; font-weight: 700; color: #fff;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ev-tail {
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid currentColor;
}

/* Cluster marker */
.cluster-marker {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 22px;
  background: #10B981; color: #fff;
  font-family: -apple-system, system-ui, sans-serif;
  font-size: 15px; font-weight: 800;
  box-shadow: 0 3px 12px rgba(16,185,129,0.4);
  border: 3px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transform: translate(-50%, -50%);
}

/* Popup */
.mapboxgl-popup-content {
  background: #161B22 !important; color: #fff;
  border-radius: 14px; padding: 0;
  font-family: -apple-system, system-ui, sans-serif;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  border: 1px solid #30363D; max-width: 260px; overflow: hidden;
}
.mapboxgl-popup-tip { border-top-color: #161B22 !important; }
.mapboxgl-popup-close-button { color: #888; font-size: 18px; padding: 8px; z-index: 1; }

.popup-card { padding: 14px; }
.popup-cat {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; margin-bottom: 8px;
}
.popup-title { font-weight: 700; font-size: 15px; color: #E6EDF3; margin-bottom: 4px; line-height: 1.3; }
.popup-location { font-size: 11px; color: #8B949E; margin-bottom: 8px; }
.popup-meta { display: flex; gap: 12px; font-size: 11px; color: #8B949E; margin-bottom: 10px; }
.popup-join {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer;
  background: #10B981; color: #fff;
}
.popup-join.joined { background: #21262D; color: #8B949E; }

/* User location */
.user-marker {
  width: 18px; height: 18px; border-radius: 50%;
  background: #3B82F6; border: 3px solid #FFF;
  box-shadow: 0 0 0 6px rgba(59,130,246,0.25);
  animation: pulse 2s ease-out infinite;
  transform: translate(-50%, -50%);
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
  100% { box-shadow: 0 0 0 20px rgba(59,130,246,0); }
}

.mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>

<script>
mapboxgl.accessToken = window.__MAPBOX_TOKEN__ || '';

const CAT = {
  spor:   { color: '#FF6B35', icon: '🏀', label: 'Spor' },
  kosu:   { color: '#10B981', icon: '🏃', label: 'Kosu' },
  kafe:   { color: '#A78BFA', icon: '☕', label: 'Kafe' },
  kitap:  { color: '#60A5FA', icon: '📖', label: 'Kitap' },
  oyun:   { color: '#F472B6', icon: '🎮', label: 'Oyun' },
  muzik:  { color: '#FBBF24', icon: '🎵', label: 'Muzik' },
  saglik: { color: '#34D399', icon: '🌿', label: 'Saglik' },
  diger:  { color: '#8B949E', icon: '✨', label: 'Diger' }
};
const TYPE_TO_CAT = {
  group_run:'kosu', tempo_run:'kosu', long_run:'kosu',
  interval:'kosu', trail_run:'kosu', race:'kosu', social:'kafe'
};

let map, userMarker, currentPopup;
let eventMarkers = [];
let activeCategory = null;

function initMap() {
  if (map || !mapboxgl.accessToken) return;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [27.1428, 38.4237],
    zoom: 13,
    attributionControl: false
  });
  map.on('load', () => {
    postRN({ type: 'mapReady' });
  });
}

function resolveCat(e) {
  if (e.category && CAT[e.category]) return e.category;
  if (e.eventType && TYPE_TO_CAT[e.eventType]) return TYPE_TO_CAT[e.eventType];
  return 'diger';
}

function createMarkerEl(e, cat) {
  const c = CAT[cat] || CAT.diger;
  const el = document.createElement('div');
  el.className = 'ev-marker';
  el.setAttribute('data-category', cat);
  el.innerHTML = `
    <div class="ev-pin" style="background:${c.color}">
      <span class="ev-icon">${c.icon}</span>
      <span class="ev-title">${esc(e.title)}</span>
    </div>
    <div class="ev-tail" style="color:${c.color}"></div>
  `;
  return el;
}

function setEvents(events) {
  // Clear old markers
  eventMarkers.forEach(m => m.marker.remove());
  eventMarkers = [];
  if (currentPopup) { currentPopup.remove(); currentPopup = null; }

  const bounds = new mapboxgl.LngLatBounds();
  let hasCoords = false;

  (events || []).forEach(e => {
    // Normalize coordinates
    const lat = e.lat || e.meetingLat;
    const lng = e.lng || e.meetingLng;
    if (!lat || !lng) return;

    const cat = resolveCat(e);
    const el = createMarkerEl(e, cat);

    // Apply category filter
    if (activeCategory && cat !== activeCategory) {
      el.style.display = 'none';
    }

    el.addEventListener('click', (evt) => {
      evt.stopPropagation();
      showEventPopup([lng, lat], e, cat);
    });

    const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([lng, lat])
      .addTo(map);

    eventMarkers.push({ marker, category: cat, data: e });
    bounds.extend([lng, lat]);
    hasCoords = true;
  });

  if (hasCoords && !userMarker) {
    map.fitBounds(bounds, { padding: 60, maxZoom: 15, duration: 800 });
  }
}

function showEventPopup(lngLat, e, cat) {
  if (currentPopup) currentPopup.remove();
  const c = CAT[cat] || CAT.diger;
  const isGoing = e.isGoing === true || e.isGoing === 'true';
  const d = new Date(e.date);
  const timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  const dateStr = d.getDate() + ' ' + ['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'][d.getMonth()];
  const count = e.attendeeCount || e.rsvpCount || 0;
  const slug = e.slug || e.id;

  currentPopup = new mapboxgl.Popup({ closeOnClick: true, offset: 20, maxWidth: '260px' })
    .setLngLat(lngLat)
    .setHTML(`
      <div class="popup-card">
        <div class="popup-cat" style="background:${c.color}22;color:${c.color}">${c.icon} ${c.label}</div>
        <div class="popup-title">${esc(e.title)}</div>
        ${e.meetingPoint ? `<div class="popup-location">📍 ${esc(e.meetingPoint)}</div>` : ''}
        <div class="popup-meta">
          <span>📅 ${dateStr} · ${timeStr}</span>
          <span>👥 ${count}${e.maxParticipants ? '/' + e.maxParticipants : ''}</span>
        </div>
        <button class="popup-join ${isGoing ? 'joined' : ''}" onclick="onJoinClick('${e.id}','${slug}')">${isGoing ? 'KATILDIN ✓' : 'KATIL'}</button>
      </div>
    `)
    .addTo(map);
}

function onJoinClick(id, slug) {
  postRN({ type: 'joinEvent', id, slug });
}

function esc(s) { return String(s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function postRN(data) {
  if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(data));
}

function setUserLocation(loc) {
  if (!map) return;
  const coords = [loc.lng, loc.lat];
  if (!userMarker) {
    const el = document.createElement('div');
    el.className = 'user-marker';
    userMarker = new mapboxgl.Marker({ element: el }).setLngLat(coords).addTo(map);
    map.flyTo({ center: coords, zoom: 14, duration: 1000 });
  } else {
    userMarker.setLngLat(coords);
  }
}

function filterCategory(category) {
  activeCategory = category || null;
  eventMarkers.forEach(m => {
    if (!activeCategory || m.category === activeCategory) {
      m.marker.getElement().style.display = '';
    } else {
      m.marker.getElement().style.display = 'none';
    }
  });
}

function setVenues(venues) {
  // Venues rendered as simple small markers
  // (placeholder for future venue layer)
}

// Message bridge
if (window.__MAPBOX_TOKEN__) initMap();

document.addEventListener('message', handleMessage);
window.addEventListener('message', handleMessage);

function handleMessage(event) {
  try {
    const msg = JSON.parse(event.data);
    switch (msg.type) {
      case 'setToken':
        window.__MAPBOX_TOKEN__ = msg.data;
        mapboxgl.accessToken = msg.data;
        initMap();
        break;
      case 'setEvents': setEvents(msg.data); break;
      case 'setVenues': setVenues(msg.data); break;
      case 'setUserLocation': setUserLocation(msg.data); break;
      case 'filterCategory': filterCategory(msg.data); break;
      case 'flyTo':
        if (map) map.flyTo({ center: [msg.data.lng, msg.data.lat], zoom: msg.data.zoom || 14 });
        break;
    }
  } catch (e) {}
}
</script>
</body>
</html>
