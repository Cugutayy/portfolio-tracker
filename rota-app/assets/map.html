<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0D1117; overflow: hidden; }
#map { width: 100vw; height: 100vh; }

/* Popup */
.mapboxgl-popup-content {
  background: #161B22 !important; color: #fff;
  border-radius: 14px; padding: 0;
  font-family: -apple-system, system-ui, sans-serif;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  border: 1px solid #30363D; max-width: 260px; overflow: hidden;
}
.mapboxgl-popup-tip { border-top-color: #161B22 !important; }
.mapboxgl-popup-close-button { color: #888; font-size: 18px; padding: 8px 10px; }
.pp { padding: 14px; }
.pp-cat { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; margin-bottom: 8px; }
.pp-title { font-weight: 700; font-size: 15px; color: #E6EDF3; margin-bottom: 4px; }
.pp-loc { font-size: 11px; color: #8B949E; margin-bottom: 8px; }
.pp-meta { display: flex; gap: 12px; font-size: 11px; color: #8B949E; margin-bottom: 12px; }
.pp-btn { width: 100%; padding: 11px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; background: #10B981; color: #fff; }
.pp-btn.j { background: #21262D; color: #8B949E; }

/* User dot */
.user-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #3B82F6; border: 3px solid #FFF;
  box-shadow: 0 0 0 6px rgba(59,130,246,0.2);
  animation: p 2s ease-out infinite;
  transform: translate(-50%, -50%);
}
@keyframes p { 0%{box-shadow:0 0 0 0 rgba(59,130,246,0.35)} 100%{box-shadow:0 0 0 18px rgba(59,130,246,0)} }

.mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>
<script>
mapboxgl.accessToken = window.__MAPBOX_TOKEN__ || '';

// Ionicons outline SVG paths (viewBox 0 0 512 512)
const SVG = {
  spor: 'M256 464c-114.69 0-208-93.31-208-208S141.31 48 256 48s208 93.31 208 208-93.31 208-208 208zm0-384C159 80 80 159 80 256s79 176 176 176 176-79 176-176S353 80 256 80zm118.4 176h-60.8l-20.8-41.6L256 288l-36.8-73.6L198.4 256h-60.8', // basketball-outline simplified
  kosu: 'M352 256h-48l-32-80-40 120-32-80H144m208 0a96 96 0 01-96 96 96 96 0 01-96-96 96 96 0 0196-96 96 96 0 0196 96z', // fitness-outline simplified
  kafe: 'M368 112h16a64 64 0 010 128h-16m-240 64h256m-256 0V112h256v192m-288 96h320', // cafe-outline
  kitap: 'M256 160c-16-63.16-76.16-95.27-144-96v304c67.84.75 128 32.84 144 96 16-63.16 76.16-95.25 144-96V64c-67.84.75-128 32.84-144 96z', // book-outline
  oyun: 'M336 256h-48m24-24v48m-120-24h48M80 336V176a64 64 0 0164-64h224a64 64 0 0164 64v160a64 64 0 01-64 64H144a64 64 0 01-64-64z', // game-controller-outline
  muzik: 'M192 416V160l192-64v256m-192 64a48 48 0 100-96 48 48 0 000 96zm192-64a48 48 0 100-96 48 48 0 000 96z', // musical-notes-outline
  saglik: 'M256 96c-48 0-112 48-112 112 0 96 112 208 112 208s112-112 112-208c0-64-64-112-112-112z', // leaf-outline simplified
  diger: 'M259.92 262.91L216 304 176 264l43.92-41.09M336 96l-80 80-48-48L96 240m16 176V272l96-96 48 48 80-80 80 80v192' // sparkles-outline simplified
};

const CAT = {
  spor:  { c:'#FF6B35', svg: SVG.spor, l:'Spor' },
  kosu:  { c:'#10B981', svg: SVG.kosu, l:'Kosu' },
  kafe:  { c:'#A78BFA', svg: SVG.kafe, l:'Kafe' },
  kitap: { c:'#60A5FA', svg: SVG.kitap, l:'Kitap' },
  oyun:  { c:'#F472B6', svg: SVG.oyun, l:'Oyun' },
  muzik: { c:'#FBBF24', svg: SVG.muzik, l:'Muzik' },
  saglik:{ c:'#34D399', svg: SVG.saglik, l:'Saglik' },
  diger: { c:'#8B949E', svg: SVG.diger, l:'Diger' }
};
const T2C = { group_run:'kosu',tempo_run:'kosu',long_run:'kosu',interval:'kosu',trail_run:'kosu',race:'kosu',social:'kafe' };
const MO = ['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];

let map, userMarker, popup;
let eventsData = []; // store for popup lookup

function initMap() {
  if (map || !mapboxgl.accessToken) return;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [27.15, 38.43],
    zoom: 13,
    attributionControl: false
  });

  map.on('load', () => {
    // ── GeoJSON source with clustering ──
    map.addSource('events', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
      cluster: true,
      clusterMaxZoom: 14,
      clusterRadius: 50
    });

    // ── Cluster markers ──
    map.addLayer({
      id: 'clusters',
      type: 'circle',
      source: 'events',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': '#161B22',
        'circle-radius': ['step', ['get', 'point_count'], 16, 5, 20, 20, 26],
        'circle-stroke-width': 2,
        'circle-stroke-color': '#10B981'
      }
    });
    map.addLayer({
      id: 'cluster-count',
      type: 'symbol',
      source: 'events',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': '{point_count_abbreviated}',
        'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
        'text-size': 12
      },
      paint: { 'text-color': '#10B981' }
    });

    // Individual markers are DOM-based (added in setEvents)
    // GL layers not used for individual pins — emoji doesn't render in WebView GL

    // ── Click handlers ──
    map.on('click', 'event-ring', (e) => {
      if (!e.features || !e.features[0]) return;
      const p = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      showPopup(coords, p);
    });

    map.on('click', 'clusters', (e) => {
      const f = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
      if (!f.length) return;
      map.getSource('events').getClusterExpansionZoom(f[0].properties.cluster_id, (err, z) => {
        if (err) return;
        map.easeTo({ center: f[0].geometry.coordinates, zoom: z + 1 });
      });
    });

    ['event-ring', 'clusters'].forEach(l => {
      map.on('mouseenter', l, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', l, () => { map.getCanvas().style.cursor = ''; });
    });

    postRN({ type: 'mapReady' });
  });
}

function resCat(e) {
  if (e.category && CAT[e.category]) return e.category;
  if (e.eventType && CAT[e.eventType]) return e.eventType;
  if (e.eventType && T2C[e.eventType]) return T2C[e.eventType];
  return 'diger';
}

// Coordinate validation — only basic sanity check, no water filter
// (water filtering caused false positives on shoreline locations)
// Instead, we trust that create-event validates via reverse geocoding
function isValidCoord(lat, lng) {
  // Must be in Turkey region (rough bounding box)
  return lat > 35 && lat < 43 && lng > 25 && lng < 45;
}

let eventMarkers = []; // DOM markers
let activeCat = null;

function setEvents(events) {
  if (!map) return;
  eventsData = events || [];

  // Clear old markers
  eventMarkers.forEach(m => m.marker.remove());
  eventMarkers = [];

  const bounds = new mapboxgl.LngLatBounds();
  let visibleCount = 0;

  eventsData.forEach(e => {
    const lat = e.lat || e.meetingLat;
    const lng = e.lng || e.meetingLng;
    if (!lat || !lng) return;
    if (!isValidCoord(lat, lng)) return;

    const cat = resCat(e);
    const c = CAT[cat] || CAT.diger;

    // Create DOM element — SVG icon only, no background, matches filter chips
    const el = document.createElement('div');
    el.style.cssText = 'cursor:pointer;width:28px;height:28px;';
    el.innerHTML = `<svg viewBox="0 0 512 512" width="28" height="28" fill="none" stroke="${c.c}" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6))"><path d="${c.svg}"/></svg>`;
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      showPopup([lng, lat], { ...e, category: cat });
    });

    const visible = !activeCat || cat === activeCat;
    if (!visible) el.style.display = 'none';
    else visibleCount++;

    const marker = new mapboxgl.Marker({ element: el })
      .setLngLat([lng, lat])
      .addTo(map);

    eventMarkers.push({ marker, el, cat, data: e });
    bounds.extend([lng, lat]);
  });

  // Update GeoJSON for clusters (still use GL for clusters)
  if (map.getSource('events')) {
    const features = eventsData
      .filter(e => (e.lat || e.meetingLat) && (e.lng || e.meetingLng))
      .filter(e => isValidCoord(e.lat || e.meetingLat, e.lng || e.meetingLng))
      .map(e => ({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [e.lng || e.meetingLng, e.lat || e.meetingLat] },
        properties: { category: resCat(e) }
      }));
    map.getSource('events').setData({ type: 'FeatureCollection', features });
  }

  postRN({ type: 'visibleCount', count: visibleCount });

  if (eventMarkers.length > 0 && !userMarker) {
    map.fitBounds(bounds, { padding: 60, maxZoom: 15, duration: 800 });
  }
}

function showPopup(coords, p) {
  if (popup) popup.remove();
  const cat = p.category || 'diger';
  const c = CAT[cat] || CAT.diger;
  const isGoing = p.isGoing === true || p.isGoing === 'true';
  const d = new Date(p.date);
  const ok = !isNaN(d.getTime());
  const time = ok ? d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0') : '';
  const date = ok ? d.getDate()+' '+MO[d.getMonth()] : '';
  const cnt = p.attendeeCount || 0;
  const max = p.maxParticipants ? '/'+p.maxParticipants : '';
  const slug = esc(p.slug || p.id);

  popup = new mapboxgl.Popup({ closeOnClick: true, offset: 24, maxWidth: '260px' })
    .setLngLat(coords)
    .setHTML(`<div class="pp">
      <div class="pp-cat" style="background:${c.c}22;color:${c.c}">${c.l}</div>
      <div class="pp-title">${esc(p.title)}</div>
      ${p.meetingPoint ? `<div class="pp-loc">\u{1F4CD} ${esc(p.meetingPoint)}</div>` : ''}
      <div class="pp-meta">${date ? `<span>\u{1F4C5} ${date} \u00B7 ${time}</span>` : ''}<span>\u{1F465} ${cnt}${max}</span></div>
      <button class="pp-btn ${isGoing?'j':''}" onclick="postRN({type:'joinEvent',id:'${esc(p.id)}',slug:'${slug}'})">${isGoing?'KATILDIN \u2713':'KATIL'}</button>
    </div>`)
    .addTo(map);
}

function filterCategory(cat) {
  activeCat = cat || null;
  let count = 0;
  eventMarkers.forEach(m => {
    const vis = !activeCat || m.cat === activeCat;
    m.el.style.display = vis ? '' : 'none';
    if (vis) count++;
  });
  postRN({ type: 'visibleCount', count });
}

function setUserLocation(loc) {
  if (!map) return;
  const coords = [loc.lng, loc.lat];
  if (!userMarker) {
    const el = document.createElement('div');
    el.className = 'user-dot';
    userMarker = new mapboxgl.Marker({ element: el }).setLngLat(coords).addTo(map);
    map.flyTo({ center: coords, zoom: 14, duration: 1000 });
  } else {
    userMarker.setLngLat(coords);
  }
}

function setVenues() {}
function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function postRN(d) { if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(d)); }

if (window.__MAPBOX_TOKEN__) initMap();
document.addEventListener('message', hMsg);
window.addEventListener('message', hMsg);
function hMsg(ev) {
  try {
    const m = JSON.parse(ev.data);
    switch(m.type) {
      case 'setToken': window.__MAPBOX_TOKEN__=m.data; mapboxgl.accessToken=m.data; initMap(); break;
      case 'setEvents': setEvents(m.data); break;
      case 'setVenues': setVenues(m.data); break;
      case 'setUserLocation': setUserLocation(m.data); break;
      case 'filterCategory': filterCategory(m.data); break;
      case 'flyTo': if(map) map.flyTo({center:[m.data.lng,m.data.lat],zoom:m.data.zoom||14}); break;
    }
  } catch(e){}
}
</script>
</body>
</html>
