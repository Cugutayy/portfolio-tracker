<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0A; overflow: hidden; }
#map { width: 100vw; height: 100vh; }

.mapboxgl-popup-content {
  background: #111 !important;
  color: #fff;
  border-radius: 8px;
  padding: 10px 14px;
  font-family: -apple-system, system-ui, sans-serif;
  font-size: 13px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  border: 1px solid #333;
  max-width: 200px;
}
.mapboxgl-popup-tip { border-top-color: #111 !important; }
.mapboxgl-popup-close-button { color: #888; font-size: 18px; }

.popup-name { font-weight: 700; color: #E6FF00; margin-bottom: 4px; cursor: pointer; }
.popup-title { color: #ccc; margin-bottom: 4px; cursor: pointer; }
.popup-stats { display: flex; gap: 12px; font-size: 11px; color: #888; }
.popup-stats span { color: #E6FF00; font-weight: 600; }

#leaderboard {
  position: absolute; bottom: 16px; left: 12px; right: 12px;
  background: rgba(10,10,10,0.92); border: 1px solid #222;
  border-radius: 10px; padding: 10px 12px;
  font-family: -apple-system, system-ui, sans-serif;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: none;
}
#leaderboard .lb-title { font-size: 10px; color: #555; letter-spacing: 2px; margin-bottom: 6px; }
.lb-row { display: flex; align-items: center; padding: 4px 0; gap: 8px; }
.lb-rank { width: 18px; font-size: 11px; color: #555; font-weight: 700; text-align: center; }
.lb-rank.gold { color: #E6FF00; }
.lb-name { flex: 1; font-size: 12px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-km { font-size: 12px; color: #E6FF00; font-weight: 600; }
.lb-runs { font-size: 10px; color: #555; }

.mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>
<div id="leaderboard">
  <div class="lb-title">LIDER TABLOSU</div>
  <div id="lb-rows"></div>
</div>

<script>
// Token injected from React Native via postMessage
mapboxgl.accessToken = window.__MAPBOX_TOKEN__ || '';

let map;
function initMap() {
  if (map || !mapboxgl.accessToken) return;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [27.1428, 38.4237],
    zoom: 12.5,
    attributionControl: false
  });
  map.on('load', () => {
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'mapReady' }));
  });
}

// Try to init immediately if token was injected before page load
if (window.__MAPBOX_TOKEN__) initMap();

// Polyline decode (Google's algorithm)
function decodePoly(str) {
  const coords = [];
  let index = 0, lat = 0, lng = 0;
  while (index < str.length) {
    let b, shift = 0, result = 0;
    do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    coords.push([lng / 1e5, lat / 1e5]);
  }
  return coords;
}

// Deterministic color from memberId
function memberColor(id) {
  const colors = ['#E6FF00','#00E5FF','#FF6B6B','#7C4DFF','#FF9100','#00E676','#FF4081','#448AFF','#EEFF41','#18FFFF'];
  let h = 0;
  for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
  return colors[Math.abs(h) % colors.length];
}

function formatPace(secKm) {
  if (!secKm) return '--:--';
  const m = Math.floor(secKm / 60);
  const s = Math.floor(secKm % 60);
  return m + ':' + String(s).padStart(2, '0');
}

let currentPopup = null;

function postNav(type, id) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: type === 'activity' ? 'activityClick' : 'memberClick',
      id: id
    }));
  }
}
const layerIds = [];
const sourceIds = [];

function setActivities(activities) {
  // Remove old layers/sources
  layerIds.forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
  sourceIds.forEach(id => { if (map.getSource(id)) map.removeSource(id); });
  layerIds.length = 0;
  sourceIds.length = 0;
  if (currentPopup) { currentPopup.remove(); currentPopup = null; }

  const bounds = new mapboxgl.LngLatBounds();
  let hasCoords = false;

  activities.forEach((act, i) => {
    if (!act.polylineEncoded) return;
    const coords = decodePoly(act.polylineEncoded);
    if (coords.length < 2) return;

    const srcId = 'route-' + i;
    const layerId = 'line-' + i;
    const color = memberColor(act.memberId);

    map.addSource(srcId, {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords }, properties: {} }
    });

    map.addLayer({
      id: layerId,
      type: 'line',
      source: srcId,
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': color, 'line-width': 3, 'line-opacity': 0.7 }
    });

    sourceIds.push(srcId);
    layerIds.push(layerId);

    coords.forEach(c => { bounds.extend(c); hasCoords = true; });

    // Click handler
    map.on('click', layerId, (e) => {
      if (currentPopup) currentPopup.remove();
      const km = (act.distanceM / 1000).toFixed(1);
      const pace = formatPace(act.avgPaceSecKm);
      currentPopup = new mapboxgl.Popup({ closeOnClick: true, offset: 10 })
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-name" onclick="postNav('member','${act.memberId}')">${act.memberName}</div>
          <div class="popup-title" onclick="postNav('activity','${act.id}')">${act.title}</div>
          <div class="popup-stats">${km} km <span>${pace}/km</span></div>
        `)
        .addTo(map);
      // Notify React Native of activity click
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'activityClick', id: act.id }));
      }
    });

    map.on('mouseenter', layerId, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', layerId, () => { map.getCanvas().style.cursor = ''; });
  });

  if (hasCoords) {
    map.fitBounds(bounds, { padding: 50, maxZoom: 15, duration: 800 });
  }
}

function setLeaderboard(entries) {
  const el = document.getElementById('leaderboard');
  const rows = document.getElementById('lb-rows');
  if (!entries || entries.length === 0) { el.style.display = 'none'; return; }

  rows.innerHTML = entries.slice(0, 5).map((e, i) => `
    <div class="lb-row" onclick="postNav('member','${e.memberId}')" style="cursor:pointer">
      <div class="lb-rank ${i === 0 ? 'gold' : ''}">${i + 1}</div>
      <div class="lb-name">${e.memberName}</div>
      <div class="lb-km">${e.totalDistanceKm.toFixed(1)} km</div>
      <div class="lb-runs">${e.totalRuns} kosu</div>
    </div>
  `).join('');
  el.style.display = 'block';
}

// Listen for messages from React Native
document.addEventListener('message', handleMessage);
window.addEventListener('message', handleMessage);

function handleMessage(event) {
  try {
    const msg = JSON.parse(event.data);
    if (msg.type === 'setToken') {
      window.__MAPBOX_TOKEN__ = msg.data;
      mapboxgl.accessToken = msg.data;
      initMap();
    }
    if (msg.type === 'setActivities') setActivities(msg.data);
    if (msg.type === 'setLeaderboard') setLeaderboard(msg.data);
    if (msg.type === 'fitBounds' && map) map.flyTo({ center: [27.1428, 38.4237], zoom: 12.5 });
  } catch (e) {}
}
</script>
</body>
</html>
